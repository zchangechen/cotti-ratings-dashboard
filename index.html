<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库迪咖啡 Google 评分看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#c0392b;--primary-light:#e74c3c;--bg:#f8f9fa;--card:#fff;--text:#2c3e50;
  --text-light:#7f8c8d;--border:#ecf0f1;--shadow:0 2px 12px rgba(0,0,0,.08);
  --green:#27ae60;--orange:#f39c12;--red:#e74c3c;--blue:#3498db;
  --high:#e74c3c;--mid:#f39c12;--low:#27ae60;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:20px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.2)}
.header-inner{max-width:1300px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo h1{font-size:20px;font-weight:700}
.logo span{font-size:13px;opacity:.7;font-weight:400}
.header-actions{display:flex;gap:8px}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px)}
.btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-outline:hover{background:rgba(255,255,255,.1)}
.btn-sm{padding:5px 12px;font-size:12px}
.tabs{display:flex;gap:0;max-width:1300px;margin:0 auto;padding:0 24px;margin-top:16px}
.tab{padding:10px 24px;border:none;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:14px;font-weight:600;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#fff;border-bottom-color:var(--primary-light)}
.tab:hover{color:rgba(255,255,255,.9)}
main{max-width:1300px;margin:0 auto;padding:24px}
.page{display:none}
.page.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--shadow);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-label{font-size:13px;color:var(--text-light);margin-bottom:4px}
.stat-value{font-size:28px;font-weight:800}
.stat-sub{font-size:12px;color:var(--text-light);margin-top:4px}
.stat-icon{font-size:24px;margin-bottom:8px}
.rating-red{color:var(--red)}.rating-orange{color:var(--orange)}.rating-green{color:var(--green)}.rating-blue{color:var(--blue)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px 20px}
.card-body.no-padding{padding:0}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{background:#f8f9fa;font-weight:700;color:var(--text-light);font-size:12px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
tr:hover{background:#f8f9fa}
.table-container{max-height:600px;overflow-y:auto}
.rating-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-weight:700;font-size:13px}
.rating-high{background:#e8f5e9;color:#2e7d32}
.rating-mid{background:#fff3e0;color:#e65100}
.rating-low{background:#ffebee;color:#c62828}
.priority-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase}
.priority-high{background:#ffebee;color:#c62828}
.priority-mid{background:#fff3e0;color:#e65100}
.priority-low{background:#e8f5e9;color:#2e7d32}
.search-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.search-input{flex:1;min-width:200px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--primary)}
select.filter-select{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);outline:none;cursor:pointer}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.chart-container{position:relative;height:300px;width:100%}
.empty-state{text-align:center;padding:40px;color:var(--text-light)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.store-count{font-size:13px;color:var(--text-light)}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.note-text{font-size:12px;color:var(--text-light);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w-full{width:100%}
.mb-16{margin-bottom:16px}
.mt-16{margin-top:16px}
.text-center{text-align:center}
.text-sm{font-size:12px;color:var(--text-light)}
.gap-8{display:flex;gap:8px;flex-wrap:wrap}
.problem-card{background:var(--card);border-radius:8px;padding:16px;margin-bottom:12px;border-left:4px solid var(--border);transition:box-shadow .2s}
.problem-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.problem-card.high{border-left-color:var(--red)}
.problem-card.mid{border-left-color:var(--orange)}
.problem-card.low{border-left-color:var(--green)}
.problem-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.problem-title{font-weight:700;font-size:14px}
.problem-meta{font-size:12px;color:var(--text-light)}
.problem-detail{font-size:13px;color:var(--text-light);margin-top:8px;line-height:1.5}
.country-flag{font-size:18px;margin-right:4px}
.report-content{padding:16px;font-size:13px;line-height:1.8}
.report-content h1,.report-content h2,.report-content h3{font-size:16px;margin:16px 0 8px}
.report-content table{font-size:12px;margin:8px 0}
.report-content td,.report-content th{padding:6px 8px}
.report-content code{background:#f1f1f1;padding:2px 6px;border-radius:4px;font-size:12px}
.download-section{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px}
.tooltip{position:relative}
.tooltip:hover:after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:10}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">&#9749;</div>
      <div>
        <h1>库迪咖啡 Google 评分看板</h1>
        <span>Cotti Coffee Global Ratings Dashboard</span>
      <span class="text-sm" id="last-updated" style="color:rgba(255,255,255,.5);font-size:11px"></span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary btn-sm" onclick="openScrapeModal()">&#128640; 开始抓取</button>
      <button class="btn btn-outline btn-sm" onclick="downloadExcel('stores')">&#128229; 导出门店 Excel</button>
      <button class="btn btn-outline btn-sm" onclick="downloadExcel('problems')">&#128229; 导出问题 Excel</button>
      <a href="downloads/库迪咖啡_Google评分评论_抓取结果.xlsx" class="btn btn-outline btn-sm" download>&#128196; 原始数据</a>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">&#128202; 总览</button>
    <button class="tab" onclick="switchTab('stores')">&#128203; 门店列表</button>
    <button class="tab" onclick="switchTab('problems')">&#9888;&#65039; 问题追踪</button>
  </div>
</header>

<main>
  <!-- OVERVIEW PAGE -->
  <div id="page-overview" class="page active">
    <div class="stats-grid" id="stats-cards"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header">&#127757; 各国评分概览</div>
        <div class="card-body no-padding">
          <div class="table-container" style="max-height:500px">
            <table id="country-table">
              <thead><tr><th>国家</th><th>门店</th><th>均分</th><th>评论</th><th>最高</th><th>最低</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
      <div>
        <div class="card mb-16">
          <div class="card-header">&#128200; 评分分布</div>
          <div class="card-body"><div class="chart-container"><canvas id="ratingChart"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-header">&#9888;&#65039; 问题门店概览</div>
          <div class="card-body">
            <div id="problem-summary" class="stats-grid" style="grid-template-columns:repeat(3,1fr)"></div>
            <div class="mt-16 text-center"><a href="#" onclick="switchTab('problems')">查看全部问题门店 &rarr;</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- STORES PAGE -->
  <div id="page-stores" class="page">
    <div class="search-bar">
      <input type="text" class="search-input" id="store-search" placeholder="搜索门店名称..." oninput="renderStores()">
      <select class="filter-select" id="store-country" onchange="renderStores()"><option value="">全部国家</option></select>
      <select class="filter-select" id="store-rating" onchange="renderStores()">
        <option value="">全部评分</option><option value="5">5.0</option><option value="4.5">≥4.5</option><option value="4">≥4.0</option><option value="3.5">≥3.5</option><option value="3">≥3.0</option><option value="0">&lt;3.0</option>
      </select>
      <select class="filter-select" id="store-status" onchange="renderStores()">
        <option value="">全部状态</option><option value="已查询">已查询</option><option value="需人工核对">需人工核对</option><option value="暂无评分评论">暂无评分评论</option><option value="Google暂未找到">Google暂未找到</option>
      </select>
      <span class="store-count" id="store-count"></span>
    </div>
    <div class="card">
      <div class="card-body no-padding">
        <div class="table-container" style="max-height:70vh">
          <table id="store-table">
            <thead>
              <tr>
                <th onclick="sortStores('country')" style="cursor:pointer">国家 &#8597;</th>
                <th>门店名称</th>
                <th onclick="sortStores('rating')" style="cursor:pointer">评分 &#8597;</th>
                <th onclick="sortStores('reviews')" style="cursor:pointer">评论数 &#8597;</th>
                <th>Google门店名</th>
                <th>状态</th>
                <th>链接</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- PROBLEMS PAGE -->
  <div id="page-problems" class="page">
    <div class="search-bar">
      <select class="filter-select" id="problem-priority" onchange="renderProblems()">
        <option value="">全部优先级</option><option value="高">高优先级</option><option value="中">中优先级</option><option value="低">低优先级</option>
      </select>
      <select class="filter-select" id="problem-country" onchange="renderProblems()"><option value="">全部国家</option></select>
      <span class="store-count" id="problem-count"></span>
    </div>
    <div id="problem-list"></div>
  </div>
</main>

<script>
// ==================== DATA LOADING ====================
let stores=[],countries=[],problems=[],report={},stats={};
let storeSort={field:null,asc:true};

async function loadData(){
  try{
    const[st,co,pr,rp,ss]=await Promise.all([
      fetch('data/stores.json').then(r=>r.json()),
      fetch('data/countries.json').then(r=>r.json()),
      fetch('data/problems.json').then(r=>r.json()),
      fetch('data/report.json').then(r=>r.json()),
      fetch('data/stats.json').then(r=>r.json())
    ]);
    stores=st;countries=co;problems=pr;report=rp;stats=ss;
    console.log('Loaded:',stores.length,'stores,',countries.length,'countries,',problems.length,'problems');
    initApp();
  }catch(e){console.error('Load error:',e);showError('数据加载失败，请检查网络连接')}
}

function showError(msg){
  document.querySelector('main').innerHTML='<div class="empty-state"><div class="icon">&#9888;</div><h3>'+msg+'</h3></div>';
}

// ==================== INIT ====================
function initApp(){
  renderOverview();
  initCountryFilters();
  renderProblems();
  document.getElementById('last-updated').textContent=stats.lastUpdated||'';
}

// ==================== TAB SWITCHING ====================
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector('.tab[onclick*="'+name+'"]').classList.add('active');
  document.getElementById('page-'+name).classList.add('active');
  if(name==='overview') renderOverview();
  if(name==='stores') renderStores();
  if(name==='problems') renderProblems();
}

// ==================== OVERVIEW ====================
function renderOverview(){
  const s=stats;
  if(!s.totalStores)return;

  // Stats cards
  const cards=[
    {icon:'&#127758;',label:'覆盖国家',value:s.totalCountries,sub:'全球布局',color:''},
    {icon:'&#127968;',label:'门店总数',value:s.totalStores,sub:s.ratedStoreCount+' 家有评分数据',color:''},
    {icon:'&#11088;',label:'平均评分',value:s.avgRating,sub:s.totalReviews.toLocaleString()+' 条总评论',color:s.avgRating>=4?'rating-green':s.avgRating>=3.5?'rating-orange':'rating-red'},
    {icon:'&#128161;',label:'问题门店',value:s.problemStats.total,sub:'高:'+s.problemStats.high+' 中:'+s.problemStats.mid+' 低:'+s.problemStats.low,color:s.problemStats.high>0?'rating-red':''}
  ];
  document.getElementById('stats-cards').innerHTML=cards.map(c=>
    '<div class="stat-card"><div class="stat-icon">'+c.icon+'</div><div class="stat-label">'+c.label+'</div><div class="stat-value '+c.color+'">'+c.value+'</div><div class="stat-sub">'+c.sub+'</div></div>'
  ).join('');

  // Country table
  let tb='';
  countries.forEach(c=>{
    let cls=c.avgRating>=4.5?'rating-high':c.avgRating>=4?'rating-mid':'rating-low';
    tb+='<tr><td><strong>'+c.name+'</strong></td><td>'+c.storeCount+'</td>';
    tb+='<td><span class="rating-badge '+cls+'">'+(c.avgRating||'-')+'</span></td>';
    tb+='<td>'+c.totalReviews.toLocaleString()+'</td>';
    tb+='<td><span class="text-sm">'+c.bestRating+' ('+c.bestStore+')</span></td>';
    tb+='<td><span class="text-sm">'+c.worstRating+' ('+c.worstStore+')</span></td></tr>';
  });
  document.querySelector('#country-table tbody').innerHTML=tb;

  // Rating chart
  const dist=s.ratingDistribution;
  const ctx=document.getElementById('ratingChart');
  if(window._ratingChart) window._ratingChart.destroy();
  window._ratingChart=new Chart(ctx,{
    type:'bar',
    data:{labels:['< 3.0','3.0-3.5','3.5-4.0','4.0-4.5','4.5-5.0'],
      datasets:[{label:'门店数',data:[dist['0-3.0'],dist['3.0-3.5'],dist['3.5-4.0'],dist['4.0-4.5'],dist['4.5-5.0']],
        backgroundColor:['#e74c3c','#f39c12','#f1c40f','#2ecc71','#27ae60'],borderRadius:8}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:Math.max(1,Math.ceil(s.ratedStoreCount/8))}}}}
  });

  // Problem summary
  document.getElementById('problem-summary').innerHTML=[
    {label:'高优先级',value:s.problemStats.high,cls:'priority-high'},
    {label:'中优先级',value:s.problemStats.mid,cls:'priority-mid'},
    {label:'低优先级',value:s.problemStats.low,cls:'priority-low'}
  ].map(p=>'<div class="stat-card"><div class="stat-value '+p.cls+'">'+p.value+'</div><div class="stat-label">'+p.label+'</div></div>').join('');
}

// ==================== STORES ====================
function initCountryFilters(){
  const sel1=document.getElementById('store-country');
  const sel2=document.getElementById('problem-country');
  countries.forEach(c=>{
    sel1.innerHTML+='<option value="'+c.name+'">'+c.name+'</option>';
    sel2.innerHTML+='<option value="'+c.name+'">'+c.name+'</option>';
  });
}

function sortStores(field){
  if(storeSort.field===field) storeSort.asc=!storeSort.asc;
  else{storeSort.field=field;storeSort.asc=field==='rating'||field==='reviews'?false:true}
  renderStores();
}

function renderStores(){
  const q=(document.getElementById('store-search').value||'').toLowerCase();
  const c=document.getElementById('store-country').value;
  const r=document.getElementById('store-rating').value;
  const s=document.getElementById('store-status').value;

  let filtered=stores.filter(st=>{
    if(q&&!st['门店'].toLowerCase().includes(q)&&!(st['国家']||'').toLowerCase().includes(q)) return false;
    if(c&&st['国家']!==c) return false;
    if(s&&st['查询状态']!==s) return false;
    if(r){
      const rating=parseFloat(st['当前Google评分']);
      if(isNaN(rating)) return false;
      if(r==='5'&&rating<5) return false;
      if(r==='0'&&rating>=3) return false;
      if(!isNaN(parseFloat(r))&&rating<parseFloat(r)) return false;
    }
    return true;
  });

  // Sort
  if(storeSort.field){
    filtered.sort((a,b)=>{
      let va,vb;
      if(storeSort.field==='rating'){va=parseFloat(a['当前Google评分'])||0;vb=parseFloat(b['当前Google评分'])||0}
      else if(storeSort.field==='reviews'){va=parseInt(a['当前Google评论数'])||0;vb=parseInt(b['当前Google评论数'])||0}
      else{va=(a['国家']||'').toLowerCase();vb=(b['国家']||'').toLowerCase();return storeSort.asc?va.localeCompare(vb):vb.localeCompare(va)}
      return storeSort.asc?va-vb:vb-va;
    });
  }

  document.getElementById('store-count').textContent='共 '+filtered.length+' 家门店';

  let tb='';
  filtered.forEach(st=>{
    const rating=parseFloat(st['当前Google评分']);
    let rcls='';
    if(!isNaN(rating)) rcls=rating>=4.5?'rating-high':rating>=4?'rating-mid':'rating-low';

    tb+='<tr>';
    tb+='<td>'+st['国家']+'</td>';
    tb+='<td><strong>'+st['门店']+'</strong></td>';
    tb+='<td>'+(rating?('<span class="rating-badge '+rcls+'">'+rating.toFixed(1)+'</span>'):'-')+'</td>';
    tb+='<td>'+(st['当前Google评论数']||'-')+'</td>';
    tb+='<td><span class="note-text" title="'+(st['Google门店名称']||'')+'">'+(st['Google门店名称']||'-')+'</span></td>';
    tb+='<td>'+st['查询状态']+'</td>';
    tb+='<td>'+(st['Google Maps 链接']?'<a href="'+st['Google Maps 链接']+'" target="_blank">&#128279;</a>':'-')+'</td>';
    tb+='</tr>';
  });
  document.querySelector('#store-table tbody').innerHTML=tb||'<tr><td colspan="7" class="empty-state">无匹配门店</td></tr>';
}

// ==================== PROBLEMS ====================
function renderProblems(){
  const p=document.getElementById('problem-priority').value;
  const c=document.getElementById('problem-country').value;

  let filtered=problems.filter(pr=>{
    if(p&&pr.priority!==p) return false;
    if(c&&pr.country!==c) return false;
    return true;
  });
  document.getElementById('problem-count').textContent='共 '+filtered.length+' 个问题';

  let html='';
  filtered.forEach(pr=>{
    const pcls=pr.priority==='高'?'high':pr.priority==='低'?'low':'mid';
    html+='<div class="problem-card '+pcls+'">';
    html+='<div class="problem-header">';
    html+='<div><span class="priority-tag priority-'+pcls+'">'+pr.priority+'</span> '+pr.country+' - <strong>'+pr.store+'</strong></div>';
    html+='<div class="problem-meta">类型: '+pr.issueTypes+' | 置信度: '+pr.confidence+'</div>';
    html+='</div>';
    html+='<div class="problem-detail">';
    html+='<strong>当前状态:</strong> '+pr.currentStatus+'<br>';
    if(pr.currentNote) html+='<strong>备注:</strong> '+pr.currentNote+'<br>';
    if(pr.scrapedRating) html+='<strong>抓取评分:</strong> '+pr.scrapedRating+' ('+pr.scrapedReviews+'条评论)<br>';
    html+='<strong>建议:</strong> '+pr.suggestedStatus;
    if(pr.suggestedNote) html+=' - '+pr.suggestedNote;
    html+='</div>';
    html+='</div>';
  });
  document.getElementById('problem-list').innerHTML=html||'<div class="empty-state"><div class="icon">&#9989;</div><h3>无匹配问题</h3></div>';
}

// ==================== EXCEL DOWNLOAD ====================
function downloadExcel(type){
  if(type==='stores'){
    const data=stores.map(s=>({
      '国家':s['国家'],'门店':s['门店'],'Google评分':s['当前Google评分'],'Google评论数':s['当前Google评论数'],
      'Google门店名称':s['Google门店名称'],'Google Maps链接':s['Google Maps 链接'],'查询状态':s['查询状态'],'备注':s['备注']
    }));
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'门店Google评分');
    XLSX.writeFile(wb,'库迪咖啡_Google评分_'+new Date().toISOString().slice(0,10)+'.xlsx');
  }else if(type==='problems'){
    const data=problems.map(p=>({
      '优先级':p.priority,'国家':p.country,'门店':p.store,'问题类型':p.issueTypes,
      '当前状态':p.currentStatus,'抓取评分':p.scrapedRating,'抓取评论数':p.scrapedReviews,
      '建议状态':p.suggestedStatus,'建议备注':p.suggestedNote,'置信度':p.confidence,'原因':p.reason
    }));
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'问题门店');
    XLSX.writeFile(wb,'库迪咖啡_问题门店_'+new Date().toISOString().slice(0,10)+'.xlsx');
  }
}

// ==================== INIT ====================
loadData();

// ==================== SCRAPE (抓取功能) ====================
let scrapeTimer = null;

function openScrapeModal() {
  document.getElementById('scrape-modal').style.display = 'flex';
  // 填充国家选项
  const sel = document.getElementById('scrape-country');
  sel.innerHTML = '<option value="">全部国家</option>';
  if (typeof countries !== 'undefined' && countries) {
    countries.forEach(c => {
      sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
    });
  }
}

function closeScrapeModal() {
  document.getElementById('scrape-modal').style.display = 'none';
}

async function startScrape() {
  const country = document.getElementById('scrape-country').value;
  const limit = document.getElementById('scrape-limit').value;
  const proxy = document.getElementById('scrape-proxy').value;
  const btn = document.getElementById('scrape-start-btn');
  btn.disabled = true;
  btn.textContent = '启动中...';

  try {
    const resp = await fetch('/api/scrape', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({country: country || null, limit: limit || null, proxy: proxy || null})
    });
    const data = await resp.json();
    if (resp.status === 409) {
      alert('已有抓取任务在运行中！');
      btn.disabled = false;
      btn.textContent = '开始抓取';
      return;
    }
    if (!resp.ok) {
      alert('启动失败: ' + (data.error || '未知错误'));
      btn.disabled = false;
      btn.textContent = '开始抓取';
      return;
    }
    // 显示进度区域
    document.getElementById('scrape-progress-area').style.display = 'block';
    document.getElementById('scrape-status-text').textContent = '正在启动...';
    document.getElementById('scrape-progress-bar').style.width = '0%';
    document.getElementById('scrape-progress-bar').textContent = '0%';
    // 开始轮询
    scrapeTimer = setInterval(pollScrapeStatus, 1500);
    pollScrapeStatus();
  } catch(e) {
    alert('请求失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = '开始抓取';
  }
}

async function pollScrapeStatus() {
  try {
    const resp = await fetch('/api/scrape/status');
    const s = await resp.json();
    const bar = document.getElementById('scrape-progress-bar');
    const txt = document.getElementById('scrape-status-text');
    const detail = document.getElementById('scrape-detail');

    txt.textContent = s.message || s.status;

    if (s.status === 'running') {
      const pct = s.total > 0 ? Math.round(s.current / s.total * 100) : 0;
      bar.style.width = pct + '%';
      bar.textContent = pct + '%';
      bar.style.background = '#3498db';
      detail.textContent = `进度: ${s.current}/${s.total}`;
    } else if (s.status === 'done') {
      bar.style.width = '100%';
      bar.textContent = '完成!';
      bar.style.background = '#27ae60';
      txt.textContent = '抓取完成！正在刷新数据...';
      clearInterval(scrapeTimer);
      scrapeTimer = null;
      // 3秒后刷新页面
      setTimeout(() => { location.reload(); }, 2000);
    } else if (s.status === 'error') {
      bar.style.background = '#e74c3c';
      txt.textContent = '错误: ' + (s.message || '未知错误');
      clearInterval(scrapeTimer);
      scrapeTimer = null;
      document.getElementById('scrape-start-btn').disabled = false;
      document.getElementById('scrape-start-btn').textContent = '重试';
    }
  } catch(e) {
    console.error('轮询失败:', e);
  }
}

function stopScrape() {
  if (!confirm('确定要停止抓取吗？')) return;
  fetch('/api/scrape/stop', {method:'POST'}).then(() => {
    alert('已发送停止信号，请等待当前任务结束。');
  });
}
</script>

    </div>
  </div>
</div>
